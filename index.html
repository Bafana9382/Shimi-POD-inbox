let pods=[], filter='all';

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadInbox() {
  document.getElementById('pod-list').innerHTML = loading();
  try {
    const snap = await db.collection(PODS_COL).get();
    pods = [];
    snap.forEach(d => pods.push(Object.assign({_id:d.id}, d.data())));
    pods.sort((a,b) => new Date(b.submittedAt||0)-new Date(a.submittedAt||0));
    stats(); render();
    document.getElementById('hdr').textContent = 'Updated '+new Date().toLocaleTimeString();
  } catch(e) {
    pods=[]; stats();
    document.getElementById('pod-list').innerHTML = empty('Cannot connect to Firebase.<br>Check rules are set to allow read/write.','⚠️');
    document.getElementById('hdr').textContent = 'Connection error — check Firebase rules';
    console.error(e);
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function stats() {
  document.getElementById('st-total').textContent    = pods.length;
  document.getElementById('st-pending').textContent  = pods.filter(p=>!p.verified&&!p.rejected).length;
  document.getElementById('st-verified').textContent = pods.filter(p=>p.verified).length;
  document.getElementById('st-rejected').textContent = pods.filter(p=>p.rejected).length;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f,btn) {
  filter=f;
  ['all','pending','verified','rejected'].forEach(k=>{
    const b=document.getElementById('f-'+k);
    b.classList.toggle('on', k===f);
  });
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list = pods.filter(p => {
    if (filter==='pending'  && (p.verified||p.rejected)) return false;
    if (filter==='verified' && !p.verified) return false;
    if (filter==='rejected' && !p.rejected) return false;
    if (q && !(p.carrierName||'').toLowerCase().includes(q) && !(p.taskId||'').includes(q)) return false;
    return true;
  });
  if (!list.length) { document.getElementById('pod-list').innerHTML=empty('No PODs found'); return; }
  document.getElementById('pod-list').innerHTML = list.map(card).join('');
}

function card(p) {
  const color = p.rejected?'#dc2626':p.verified?'#16a34a':'#f59e0b';
  const badge = p.rejected
    ? '<span style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">✕ Rejected</span>'
    : p.verified
    ? '<span style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">✓ Verified</span>'
    : '<span style="background:#fffbeb;color:#f59e0b;border:1px solid #fde68a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">⏳ Pending</span>';

  const imgBtns = (p.imageUrls||[]).map((u,i) =>
    `<button class="btn btn-gray" style="margin:2px;padding:7px 11px;" onclick="window.open('${u}','_blank')">👁 ${i+1}</button>`
    +`<button class="btn btn-blue" style="margin:2px;padding:7px 11px;" onclick="makePDF('${p._id}','${encodeURIComponent(u)}')">📄 PDF</button>`
  ).join('');

  const actions = !p.verified&&!p.rejected
    ? `<button class="btn btn-green" style="margin:2px;" onclick="verify('${p._id}')">✓ Verify</button>`
      +`<button class="btn btn-red" style="margin:2px;" onclick="reject('${p._id}')">✕ Reject</button>`
    : '';

  return `<div id="pod-${p._id}" style="background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;border-left:4px solid ${color};padding:16px;margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;">
          <span style="font-size:15px;font-weight:800;color:#1e293b;">${p.carrierName||'—'}</span>${badge}
        </div>
        <div style="font-size:12px;color:#64748b;">Task: <strong>${p.taskId||'—'}</strong> · ${p.syncedAt||'—'}</div>
        ${p.address?`<div style="font-size:11px;color:#94a3b8;margin-top:3px;">${p.address.slice(0,75)}</div>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;">${imgBtns}${actions}</div>
    </div>
  </div>`;
}

// ── Verify / Reject ───────────────────────────────────────────────────────────
async function verify(id) {
  try {
    await db.collection(PODS_COL).doc(id).update({verified:true, verifiedAt:new Date().toISOString()});
    pods = pods.map(p => p._id===id ? Object.assign({},p,{verified:true}) : p);
    stats(); render();
  } catch(e) { alert('Error: '+e.message); }
}

async function reject(id) {
  const reason = prompt('Reason (optional):', 'Unclear image') || '';
  try {
    await db.collection(PODS_COL).doc(id).update({rejected:true, rejectedAt:new Date().toISOString(), rejectReason:reason});
    pods = pods.map(p => p._id===id ? Object.assign({},p,{rejected:true}) : p);
    stats(); render();
  } catch(e) { alert('Error: '+e.message); }
}

// ── PDF ───────────────────────────────────────────────────────────────────────
async function makePDF(podId, encodedUrl) {
  const pod = pods.find(p=>p._id===podId); if (!pod) return;
  const imgUrl = decodeURIComponent(encodedUrl);
  const btn = event.target; const orig=btn.textContent;
  btn.textContent='⏳'; btn.disabled=true;
  try {
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    doc.setFillColor(30,58,95); doc.rect(0,0,W,28,'F');
    try{doc.addImage(LOGO,'PNG',8,4,20,20);}catch(e){}
    doc.setTextColor(255,255,255);
    doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text('SHIMI Logistics',33,13);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Proof of Delivery',33,21);
    doc.setFontSize(7);doc.text('Generated: '+new Date().toLocaleString(),W-10,21,{align:'right'});
    let y=36;
    doc.setTextColor(30,41,59);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('Task ID: '+(pod.taskId||'—'),10,y);y+=7;
    doc.text('Carrier: '+(pod.carrierName||'—'),10,y);y+=7;
    doc.text('Date: '+(pod.deliveryDate||'—'),10,y);y+=7;
    if(pod.address){doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);doc.setFontSize(9);doc.text('Address: '+pod.address.slice(0,75),10,y);y+=6;}
    doc.setDrawColor(226,232,240);doc.line(10,y,W-10,y);y+=6;
    // Try multiple proxies + Cloudinary enhance to embed image
    let imgLoaded = false;
    const cleanUrl = 'https://res.cloudinary.com/dcfaagcwy/image/fetch/e_auto_contrast,e_sharpen:100,e_improve,e_unsharp_mask:500,f_jpg,q_95/'+encodeURIComponent(imgUrl);
    const proxies = [
      'https://corsproxy.io/?'+encodeURIComponent(cleanUrl),
      'https://api.allorigins.win/raw?url='+encodeURIComponent(cleanUrl),
      'https://corsproxy.io/?'+encodeURIComponent(imgUrl)
    ];
    for (const proxyUrl of proxies) {
      try {
        const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),15000);
        const resp=await fetch(proxyUrl,{signal:ctrl.signal});
        if(!resp.ok) continue;
        const blob=await resp.blob();
        if(blob.size<1000) continue;
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(blob);});
        const ip=doc.getImageProperties(b64);
        const sc=Math.min((W-20)/ip.width,(H-y-18)/ip.height,1);
        const iw=ip.width*sc, ih=ip.height*sc;
        doc.addImage(b64,'JPEG',(W-iw)/2,y,iw,ih);
        imgLoaded=true;
        break;
      } catch(e){ continue; }
    }
    if(!imgLoaded) {
      doc.setFontSize(9);doc.setTextColor(61,96,137);
      doc.text('View image: '+imgUrl.slice(0,80),10,y,{maxWidth:W-20});
      doc.link(10,y-4,W-20,8,{url:imgUrl});
    }
    doc.setFontSize(7);doc.setTextColor(148,163,184);
    doc.line(10,H-11,W-10,H-11);
    doc.text('SHIMI Logistics — Proof of Delivery — CONFIDENTIAL',10,H-5);
    doc.text('Page 1 of 1',W-10,H-5,{align:'right'});
    doc.save('POD_'+(pod.taskId||'x')+'_'+(pod.carrierName||'').replace(/\s+/g,'_')+'.pdf');
  } catch(e){ alert('PDF error: '+e.message); }
  btn.textContent=orig; btn.disabled=false;
}

function openSync() {

  document.getElementById('sync-modal').style.display='flex';
  document.getElementById('sync-result').innerHTML='';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('prog-bar').style.width='0%';
}

// ── Tookan Sync ───────────────────────────────────────────────────────────────
async function runSync() {
  const date=document.getElementById('sync-date').value;
  if(!date){alert('Pick a date');return;}
  const btn=document.getElementById('sync-btn');
  btn.disabled=true; btn.textContent='Syncing...';
  document.getElementById('sync-result').innerHTML='';
  document.getElementById('prog-wrap').style.display='block';
  const prog=(msg,pct)=>{document.getElementById('prog-msg').textContent=msg;document.getElementById('prog-bar').style.width=pct+'%';};

  try {
    prog('Loading carriers...',5);
    const cSnap=await db.collection(CARRIERS_COL).get();
    const carriers=[];
    cSnap.forEach(d=>{const c=d.data().carrier;if(c&&c.id&&c.name)carriers.push(c);});
    prog('Loaded '+carriers.length+' carriers',10);

    prog('Fetching tasks from Tookan...',12);
    // Fetch delivery (1) and pickup+delivery (2) tasks separately
    const fetchType = async (type) => {
      const r = await fetch('https://api.tookanapp.com/v2/get_all_tasks',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({api_key:TOOKAN,job_status:2,job_type:type,start_date:date,end_date:date,requested_page:1,number_of_records:200,is_pagination:1})
      });
      const d = await r.json();
      return (d.status===200) ? (d.data||[]) : [];
    };
    const [delivTasks, comboTasks] = await Promise.all([fetchType(1), fetchType(2)]);
    const seen = new Set();
    const tasks = [...delivTasks, ...comboTasks].filter(t => {
      if (seen.has(t.job_id)) return false;
      seen.add(t.job_id); return true;
    });
    prog('Found '+tasks.length+' delivery tasks',20);

    let saved=0,skipped=0,noMatch=0,noImg=0;

    for(let i=0;i<tasks.length;i++) {
      const t=tasks[i];
      const agent=(t.fleet_name||t.agent_name||'').toLowerCase().trim();
      const jobId=String(t.job_id||'');
      prog('Processing '+jobId+' ('+agent+')', Math.round(20+(i/tasks.length)*70));

      // Match carrier
      const carrier=carriers.find(c=>{
        const cn=c.name.toLowerCase().trim();
        return cn===agent||cn.includes(agent)||agent.includes(cn)||cn.split(' ')[0]===agent.split(' ')[0];
      });
      if(!carrier){noMatch++;continue;}

      // Skip duplicates
      const docId='pod-'+jobId+'-'+carrier.id;
      try{const ex=await db.collection(PODS_COL).doc(docId).get();if(ex.exists){skipped++;continue;}}catch(e){}

      // Get images via job details + task history
      let imgs=[];
      try{
        const dr=await fetch('https://api.tookanapp.com/v2/get_job_details',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({api_key:TOOKAN,job_ids:[parseInt(jobId)],include_task_history:1,job_additional_info:1})
        });
        const dd=await dr.json();
        if(dd.status===200&&dd.data&&dd.data[0]){
          const det=dd.data[0];
          (det.task_history||[]).forEach(e=>{if(e.description&&e.description.startsWith('http'))imgs.push(e.description);});
          ['ref_images','task_images','acknowledged_images','acknowledgement_images'].forEach(f=>{
            if(det[f]&&Array.isArray(det[f]))det[f].forEach(u=>{if(u&&u.startsWith('http'))imgs.push(u);});
          });
          imgs=[...new Set(imgs)];
        }
      }catch(e){console.warn('detail err:',e.message);}

      if(!imgs.length){noImg++;continue;}

      const delivDate=(t.completed_datetime||'').slice(0,10);
      try{
        await db.collection(PODS_COL).doc(docId).set({
          taskId:jobId,
          carrierId:String(carrier.id),
          carrierName:carrier.name,
          deliveryDate:delivDate,
          address:t.job_address||'',
          submittedAt:new Date().toISOString(),
          syncedAt:new Date().toLocaleString(),
          isLate:!!(delivDate&&new Date(delivDate)<new Date(new Date().toDateString())),
          verified:false,
          rejected:false,
          imageUrls:imgs
        });
        saved++;
      }catch(saveErr){
        console.error('Save failed for '+jobId+':',saveErr.message);
        skipped++;
      }
    }

    document.getElementById('prog-wrap').style.display='none';
    document.getElementById('sync-result').innerHTML=
      '<div style="border-radius:10px;padding:12px 14px;background:#f0fdf4;border:1.5px solid #bbf7d0;">'
      +'<p style="font-size:14px;font-weight:700;color:#16a34a;margin:0 0 3px;">✓ Sync Complete</p>'
      +'<p style="font-size:12px;color:#64748b;margin:0;">'+saved+' saved · '+noMatch+' unmatched · '+noImg+' no images · '+skipped+' skipped</p></div>';
    btn.disabled=false; btn.textContent='Sync PODs';
    await loadInbox();
    closeSync();
  }catch(e){
    document.getElementById('prog-wrap').style.display='none';
    document.getElementById('sync-result').innerHTML=
      '<div style="border-radius:10px;padding:12px;background:#fef2f2;border:1px solid #fecaca;">'
      +'<p style="font-size:13px;color:#dc2626;font-weight:600;margin:0;">Error: '+e.message+'</p></div>';
    btn.disabled=false; btn.textContent='Sync PODs';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function loading() {
  return '<div style="text-align:center;padding:80px 20px;color:#94a3b8;">'
    +'<div class="spin" style="width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;margin:0 auto 14px;"></div>'
    +'<p style="font-size:14px;">Loading PODs...</p></div>';
}
function empty(msg, icon) {
  return '<div style="text-align:center;padding:80px 20px;color:#94a3b8;">'
    +'<div style="font-size:48px;margin-bottom:14px;">'+(icon||'📭')+'</div>'
    +'<p style="font-size:14px;font-weight:600;color:#64748b;">'+msg+'</p></div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadInbox();
</script>
